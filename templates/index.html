<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pinless is a privacy-focused frontend for browsing public Pinterest content with less tracking.">
    <title>Pinless</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%221em%22 font-size=%2280%22>📌</text></svg>">
    <link rel="stylesheet" href="/static/reset.css">
    <link rel="stylesheet" href="/static/app.css">
</head>

<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="app">
        <main id="main-content" class="hero">
            <section class="hero__panel" aria-labelledby="home-title">
                <p class="eyebrow">Privacy-first Pinterest viewer</p>
                <h1 id="home-title" class="hero__title">Pinless</h1>
                <p class="hero__lede">
                    Search public Pinterest content without handing Pinterest your IP address directly.
                </p>
                <div class="hero__actions">
                    <form action="/search/pins/" method="GET" class="search-form" role="search">
                        <label class="visually-hidden" for="search">Search for public Pinterest content</label>
                        <div class="search-field">
                            <input
                                id="search"
                                class="search-input"
                                type="search"
                                name="q"
                                placeholder="Search for cats, recipes, design ideas, and more"
                                autocomplete="off"
                                autocapitalize="none"
                                spellcheck="false"
                                enterkeyhint="search"
                                required>
                            <button class="search-button" type="submit" aria-label="Search">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" aria-hidden="true">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
                <nav class="meta-links" aria-label="Project links">
                    <a href="https://github.com/bunk-im/pinless" target="_blank" rel="noopener noreferrer">Source</a>
                    <a href="https://github.com/bunk-im/pinless/blob/main/INSTANCES.md" target="_blank" rel="noopener noreferrer">Instances</a>
                    <a href="/about">About</a>
                </nav>
            </section>
        </main>
    </div>
</body>

</html>
