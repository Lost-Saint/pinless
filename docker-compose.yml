# Override image name, tag, or host port in a local .env file when needed.
services:
  pinless:
    build:
      context: .
      target: runtime
    image: ${PINLESS_IMAGE:-pinless}:${PINLESS_TAG:-local}
    ports:
      - "${PINLESS_PORT:-3000}:3000"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - app

networks:
  app:
    driver: bridge
